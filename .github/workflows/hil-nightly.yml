name: hil-nightly

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  smoke-3nodes:
    runs-on: [self-hosted, windows, esp32c3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        shell: powershell
        run: |
          py -3 -m pip install --upgrade pip
          py -3 -m pip install pyserial
      - name: Run regression (3 nodes)
        shell: powershell
        run: |
          .\tools\run_mesh_regression.ps1 -Ports COM6,COM7,COM8 -Scenario nightly_indoor
